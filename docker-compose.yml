services:
  # ── MongoDB 7 ────────────────────────────────────────────────────────────────
  # PostgreSQL is not needed: SQLite (file-based) is the default relational DB.
  # For production PostgreSQL, set DATABASE_URL in the environment and
  # add a postgres service here without changing any application code.
  mongodb:
    image: mongo:7-jammy
    container_name: doctrace_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── FastAPI application ───────────────────────────────────────────────────────
  #
  # Development mode:
  #   - Source is mounted as a volume → uvicorn --reload picks up changes
  #   - SQLite database is stored in ./data/doctrace.db (auto-created)
  #
  # Production: remove the volume mount and set ENVIRONMENT=production.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doctrace_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # SQLite: file stored inside the container at /app/data/doctrace.db
      DATABASE_URL: sqlite+aiosqlite:////app/data/doctrace.db
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DATABASE_NAME: doctrace_ai
      ENVIRONMENT: development
      LOG_LEVEL: INFO
      # LLM API key — override via .env file or shell export
      # OPENROUTER_API_KEY: sk-or-...
    env_file:
      # cp .env.example .env and add your OPENROUTER_API_KEY
      - path: .env
        required: false
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app                          # hot-reload: source changes visible immediately
      - doctrace_data:/app/data         # SQLite database persists across container restarts
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  mongo_data:
    driver: local
  doctrace_data:
    driver: local
