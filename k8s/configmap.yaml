apiVersion: v1
kind: ConfigMap
metadata:
  name: doctrace-config
  namespace: doctrace-ai
data:
  APP_NAME: "DocTrace AI"
  APP_VERSION: "0.1.0"
  ENVIRONMENT: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  DATABASE_URL: "postgresql+asyncpg://doctrace:$(POSTGRES_PASSWORD)@postgres:5432/doctrace_db"
  DATABASE_ECHO_SQL: "false"
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "20"
  DB_POOL_TIMEOUT: "30.0"
  DB_POOL_RECYCLE: "3600"
  DB_POOL_PRE_PING: "true"
  MONGODB_URL: "mongodb://mongodb:27017"
  MONGODB_DATABASE_NAME: "doctrace_ai"
  REDIS_URL: "redis://redis:6379/0"
  OPENROUTER_BASE_URL: "https://openrouter.ai/api/v1"
  LLM_MODEL: "google/gemini-2.5-flash"
  LLM_TIMEOUT_SECONDS: "60.0"
  LLM_MAX_RETRIES: "3"
  LLM_RETRY_MIN_WAIT_SECONDS: "1.0"
  LLM_RETRY_MAX_WAIT_SECONDS: "30.0"
  MAX_UPLOAD_SIZE_MB: "50"
  DEFAULT_PAGE_SIZE: "20"
  MAX_PAGE_SIZE: "100"
  OTEL_ENABLED: "true"
  OTEL_SERVICE_NAME: "doctrace-ai"
  OTEL_EXPORTER_ENDPOINT: "http://otel-collector:4317"
  OTEL_EXPORTER_INSECURE: "true"
  METRICS_ENABLED: "true"
  METRICS_PATH: "/metrics"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW_SECONDS: "60"