apiVersion: v1
kind: ServiceAccount
metadata:
  name: doctrace-api
  namespace: doctrace-ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: doctrace-api
  namespace: doctrace-ai
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: doctrace-api
  namespace: doctrace-ai
subjects:
  - kind: ServiceAccount
    name: doctrace-api
    namespace: doctrace-ai
roleRef:
  kind: Role
  name: doctrace-api
  apiGroup: rbac.authorization.k8s.io