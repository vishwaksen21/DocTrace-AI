apiVersion: v1
kind: Secret
metadata:
  name: doctrace-secrets
  namespace: doctrace-ai
type: Opaque
stringData:
  # Generate with: openssl rand -hex 32
  SECRET_KEY: "CHANGE_ME_IN_PRODUCTION_MIN_32_CHARS"
  # Get from: https://openrouter.ai/keys
  OPENROUTER_API_KEY: "sk-or-CHANGE_ME"
  # PostgreSQL password (match postgres deployment)
  POSTGRES_PASSWORD: "CHANGE_ME"