apiVersion: v1
kind: Secret
metadata:
  name: {{ include "doctrace-ai.fullname" . }}-secrets
  labels:
    {{- include "doctrace-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ .Values.postgresql.url | default (printf "postgresql+asyncpg://%s:%s@%s-postgresql/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "doctrace-ai.fullname" .) .Values.postgresql.auth.database) }}
  mongodb-url: {{ .Values.mongodb.url | default (printf "mongodb://%s:%s@%s-mongodb/%s" .Values.mongodb.auth.username .Values.mongodb.auth.password (include "doctrace-ai.fullname" .) .Values.mongodb.auth.database) }}
  redis-url: {{ .Values.redis.url | default (printf "redis://%s-master/%d" (include "doctrace-ai.fullname" .) .Values.redis.db | default 0) }}
  secret-key: {{ .Values.secrets.secretKey }}
  openrouter-api-key: {{ .Values.secrets.openrouterApiKey }}